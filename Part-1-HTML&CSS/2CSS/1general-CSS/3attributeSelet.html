<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attribute Selector</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      div {
        margin-top: 10px;
      }
      /* Selecting Attributes */
      input[type="text"] {
        color: red;
        background-color: lightcoral;
        height: 40px;
        border-radius: 8px;
      }

      input[type="email"] {
        color: blue;
        background-color: lightgreen;
        height: 40px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <form action="">
      <div>
        <label for="i1">Enter Name</label>
        <input type="text" id="i1" value="Text" />
      </div>

      <div>
        <label for="i2">Enter email</label>
        <input type="email" placeholder="email" />
      </div>
    </form>
  </body>
</html>
