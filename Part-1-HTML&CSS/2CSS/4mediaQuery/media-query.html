<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Query</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      body {
        border: 8px solid red;
        height: 100vh;
        padding: 10px;
        background-color: lightgreen;
      }

      @media all and (min-width: 04px) and (max-width: 320px) {
        body {
          background-color: black;
          color: white;
        }
      }

      @media all and (min-width: 321px) and (max-width: 425px) {
        body {
          background-color: lightcyan;
        }
      }

      @media all and (min-width: 426px) and (max-width: 768px) {
        body {
          background-color: lightsteelblue;
        }
      }

      @media all and (min-width: 769px) {
        body {
          background-color: lightpink;
        }
      }
    </style>
  </head>
  <body>
    <p>
      Desktop: (min-width:1024px) <br />
      Tablet: (min-width:768px) and (max-width:1023px) <br />
      Smartphone :(min-width:340px) and (max-width:767px) <br />
    </p>
  </body>
</html>
